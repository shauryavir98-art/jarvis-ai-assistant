<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS — Reminders</title>
    <meta name="description" content="Manage your reminders with JARVIS AI Assistant">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="app-layout">

    <!-- ──── Sidebar ──── -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h2><i class="bi bi-robot"></i> JARVIS</h2>
            <small>AI Assistant v1.0</small>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">Main</div>
            <a th:href="@{/dashboard}" class="nav-item">
                <i class="bi bi-grid-1x2-fill"></i> Dashboard
            </a>
            <a th:href="@{/chat}" class="nav-item">
                <i class="bi bi-chat-dots-fill"></i> Chat
            </a>
            <a th:href="@{/reminders}" class="nav-item active">
                <i class="bi bi-bell-fill"></i> Reminders
            </a>

            <div class="nav-label">System</div>
            <a href="#" class="nav-item">
                <i class="bi bi-gear-fill"></i> Settings
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(username, 0, 1))}">A</div>
                <div class="user-info">
                    <div class="user-name" th:text="${username}">admin</div>
                </div>
            </div>
            <a th:href="@{/logout}" class="nav-item" style="margin-top: 0.75rem; padding-left: 0;">
                <i class="bi bi-box-arrow-left"></i> Logout
            </a>
        </div>
    </aside>

    <!-- ──── Main Content ──── -->
    <main class="main-content">
        <div class="page-header">
            <h1><i class="bi bi-bell-fill"></i> Reminders</h1>
            <p>Manage your upcoming tasks and reminders.</p>
        </div>

        <!-- Toolbar -->
        <div class="reminder-toolbar">
            <div>
                <span class="badge pending" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">
                    <span th:text="${pendingCount}">0</span> Pending
                </span>
            </div>
            <button class="btn-action" id="addReminderBtn">
                <i class="bi bi-plus-lg"></i> New Reminder
            </button>
        </div>

        <!-- Reminder List -->
        <div class="reminder-list" id="reminderList">
            <div th:if="${#lists.isEmpty(reminders)}" class="empty-state">
                <div class="empty-icon">🔔</div>
                <p>No reminders yet. Click "New Reminder" to create one!</p>
            </div>

            <div th:each="reminder : ${reminders}"
                 th:class="'reminder-card ' + ${reminder.status.toLowerCase()}"
                 th:data-id="${reminder.id}">
                <div th:class="'reminder-status-dot ' + ${reminder.status.toLowerCase()}"></div>
                <div class="reminder-info">
                    <div class="reminder-title" th:text="${reminder.title}">Title</div>
                    <div class="reminder-time">
                        🕐 <span th:text="${#temporals.format(reminder.reminderTime, 'MMM dd, yyyy — hh:mm a')}">Time</span>
                    </div>
                </div>
                <span th:class="'badge ' + ${reminder.status.toLowerCase()}" th:text="${reminder.status}">STATUS</span>
                <div class="reminder-actions">
                    <button class="btn-complete" th:onclick="'completeReminder(' + ${reminder.id} + ')'" title="Mark as complete">✓</button>
                    <button class="btn-delete" th:onclick="'deleteReminder(' + ${reminder.id} + ')'" title="Delete">✕</button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- ──── Create Reminder Modal ──── -->
<div class="modal-overlay" id="reminderModal">
    <div class="modal-card">
        <h3><i class="bi bi-bell-fill"></i> New Reminder</h3>
        <form id="reminderForm">
            <div class="form-group">
                <label for="reminderTitle">Title</label>
                <input type="text" id="reminderTitle" placeholder="e.g., Team meeting at 3 PM" required>
            </div>
            <div class="form-group">
                <label for="reminderTime">Date &amp; Time</label>
                <input type="datetime-local" id="reminderTime" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-action btn-ghost" id="cancelModal">Cancel</button>
                <button type="submit" class="btn-action">
                    <i class="bi bi-check-lg"></i> Create
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/reminders.js}"></script>
</body>
</html>
