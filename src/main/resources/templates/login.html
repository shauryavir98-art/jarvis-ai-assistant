<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS — Login</title>
    <meta name="description" content="Login to JARVIS AI Assistant - Your intelligent digital companion">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo">
            <h1><i class="bi bi-robot"></i> JARVIS</h1>
            <p>Just A Rather Very Intelligent System</p>
        </div>

        <!-- Error alerts -->
        <div th:if="${param.error}" class="alert-error">
            <i class="bi bi-exclamation-circle"></i> Invalid username or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="alert-success">
            <i class="bi bi-check-circle"></i> You have been successfully logged out.
        </div>
        <div th:if="${param.expired}" class="alert-error">
            <i class="bi bi-clock"></i> Your session has expired. Please login again.
        </div>
        <div th:if="${success}" class="alert-success">
            <i class="bi bi-check-circle"></i> <span th:text="${success}">Success</span>
        </div>

        <!-- Login form -->
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username"><i class="bi bi-person"></i> Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Enter your username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password"><i class="bi bi-lock"></i> Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-primary-gradient" style="margin-top: 0.5rem;">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>

        <div class="alt-link">
            Don't have an account? <a th:href="@{/register}">Create one</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
