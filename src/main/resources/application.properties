# ============================================================
# JARVIS AI Assistant — Application Configuration
# Spring Boot 3.x + Java 21
# ============================================================

spring.application.name=JARVIS AI Assistant

# ──────────── MySQL Database ────────────
spring.datasource.url=jdbc:mysql://localhost:3306/jarvis_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Shaurya@1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──────────── JPA / Hibernate ────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ──────────── Thymeleaf ────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ──────────── Server ────────────
server.port=8080
server.servlet.session.timeout=30m

# ──────────── Actuator ────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ──────────── JARVIS AI Engine ────────────
jarvis.ai-engine.url=http://localhost:5000

# ──────────── Logging ────────────
logging.level.com.example.alj=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
